- Ecommerce
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Gooten spend. Gooten charges no platform subscription or API
  fee; cost is entirely cost-of-goods-sold, incurred per order at the moment an
  item is manufactured and shipped. Each order line accrues a base production
  cost (product + print) plus destination-based shipping, with possible
  surcharges, taxes, and fees. Because there is no fixed rate card, the API's
  price and shippingprices endpoints are the source of truth for unit cost and
  should be called before checkout so retail margin can be computed live. The
  dominant optimization levers are product/SKU selection, decoration choices,
  shipping method, vendor routing region, and negotiated enterprise volume
  pricing.
notes: >-
  Per-unit base costs are dynamic and returned by the API rather than published;
  amounts are not reconciled here. Model Gooten spend as COGS per fulfilled
  order, not as a recurring SaaS line item.
sources:
