- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Gooten
serviceCategory: Manufacturing and Fulfillment
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Per Order
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Tax
  - Adjustment
focusColumns:
  ServiceName: Gooten Print on Demand
  ServiceCategory: Manufacturing and Fulfillment
  ProviderName: Gooten
  PublisherName: Gooten
  InvoiceIssuerName: Gooten
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Usage-Based
meters:
- name: production_cost
  description: Base product plus print cost per manufactured order item.
  unit: order_items
  aggregation: sum
  dimensions:
  - recipe
  - sku
  - region
- name: shipping_cost
  description: Shipping charge per shipment, calculated by destination and product.
  unit: shipments
  aggregation: sum
  dimensions:
  - recipe
  - destination_country
- name: surcharges_taxes_fees
  description: Surcharges, taxes, and fees applied to an order as returned in the billing summary.
  unit: orders
  aggregation: sum
  dimensions:
  - recipe
  - destination_country
- name: discounts
  description: Discounts applied to an order, including negotiated enterprise volume discounts.
  unit: orders
  aggregation: sum
  dimensions:
  - recipe
principles:
- name: Visibility
  description: Call price and orderbilling to capture per-order product, shipping, surcharge, tax, and fee breakdowns; reconcile against retail revenue.
- name: Allocation
  description: Tag orders with a stable SourceId and map RecipeIDs to storefronts/brands so COGS maps to the right cost center.
- name: Optimization
  description: Choose lower-cost SKUs and decoration, select appropriate shipping methods, route to nearer vendor regions, and negotiate enterprise volume pricing at scale.
- name: Accountability
  description: Review per-order margin (retail minus Gooten base + shipping + fees) regularly; set retail prices from live API quotes rather than stale rate cards.
