  description: Browse the Gooten catalog. A product is a category (for example
    "Canvas Wraps"); each product has region-specific SKUs (variants) available
    per shipping country. List products, list variants and pricing for a product
    by country and currency, and look up supported shipping countries and
    currencies used across the rest of the API.
- aid: gooten:gooten-orders-api
  name: Gooten Orders API
  tags:
  - Orders
  - Fulfillment
  - Billing
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.gooten.com/api-documentation/submitting-an-order/
  baseURL: https://api.print.io/api/v/5/source/api
  properties:
  - url: https://www.gooten.com/api-documentation/submitting-an-order/
    type: Documentation
  - url: https://www.gooten.com/api-documentation/get-order-by-id/
    type: APIReference
  - url: openapi/gooten-openapi.yml
    type: OpenAPI
  - url: collections/gooten.postman_collection.json
    type: PostmanCollection
  - url: collections/gooten.opencollection.json
    type: OpenCollection
  description: Submit manufacturing orders with ship-to and billing addresses,
    line items (SKU, quantity, artwork images, ship method), and a Payment object
    carrying the PartnerBillingKey. Retrieve an order by its Safe Order ID or
    search orders by name, email, postal code, and date range, get full billing
    breakdowns, and update the shipping address or method on in-flight orders.
- aid: gooten:gooten-shipping-api
  name: Gooten Shipping API
  tags:
  - Shipping
  - Pricing
  - Estimates
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.gooten.com/api-documentation/shipping-options-for-a-cart/
