  - url: https://www.gooten.com/api-documentation/product-variants-skus-for-a-product/
    type: APIReference
  - url: openapi/gooten-openapi.yml
    type: OpenAPI
  - url: collections/gooten.postman_collection.json
    type: PostmanCollection
