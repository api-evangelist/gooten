  - url: openapi/gooten-openapi.yml
    type: OpenAPI
  - url: collections/gooten.postman_collection.json
    type: PostmanCollection
  - url: collections/gooten.opencollection.json
    type: OpenCollection
  description: Quote a cart before you submit it. Post ship-to location and line
    items to retrieve available shipping options and their costs, and post a full
    cart to estimate the total order price - product cost, shipping, surcharges,
    taxes, and fees - in a chosen currency.
- aid: gooten:gooten-print-assets-api
  name: Gooten Print Assets API
  tags:
  - Print Assets
  - Templates
  - Artwork
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.gooten.com/api-documentation/print-ready-products/
  baseURL: https://api.print.io
  properties:
  - url: https://www.gooten.com/api-documentation/listing-product-templates-for-a-sku/
    type: Documentation
  - url: https://www.gooten.com/api-documentation/print-ready-products/
    type: APIReference
  - url: openapi/gooten-openapi.yml
    type: OpenAPI
  - url: collections/gooten.postman_collection.json
    type: PostmanCollection
  - url: collections/gooten.opencollection.json
    type: OpenCollection
  description: Manage the artwork and print data behind a SKU. Retrieve the
    product template for a SKU - the image spaces, required sizes, and
    coordinates that describe how to build print-ready art - then create, list,
    update, and delete print-ready products (PRPs) that bind a Gooten SKU to your
    artwork so it can be ordered directly. Note the PRP endpoints live under the
    /api/v2/recipes/{recipeId} base.
